name: Build EXE

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: msbuild src/core/MpqInstaller.csproj /t:Restore /p:Configuration=Release

      - name: Build
        run: msbuild src/core/MpqInstaller.csproj /t:Build /p:Configuration=Release /p:Platform=AnyCPU

      - name: Copy output
        run: |
          New-Item -ItemType Directory -Force -Path publish
          Copy-Item -Path "src/core/bin/Release/net48/*" -Destination publish -Recurse -Force

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: MpqInstaller
          path: publish/

name: Build EXE

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/core/MpqInstaller.csproj

      - name: Build
        run: dotnet build src/core/MpqInstaller.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish src/core/MpqInstaller.csproj -c Release -r win-x64 --self-contained false -o publish

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: MpqInstaller
          path: publish/
